name: Daily Accumulation Radar

on:
  schedule:
    - cron: '3 13 * * 1-5'  # UTC 13:03 = TW 21:03
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run accumulation radar and push LINE
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_BULLISH_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          DISCORD_WEBHOOK_STOCK: ${{ secrets.DISCORD_WEBHOOK_STOCK }}
        run: python3 run_accumulation.py
      # Fallback only — local Windows Task Scheduler runs the full version
      # with watchlist highlighting. This fallback activates when laptop is off.
      - name: Commit history snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/accumulation_latest.json
          git diff --cached --quiet || git commit -m "update accumulation snapshot $(date -u +%Y-%m-%d)"
          git push
